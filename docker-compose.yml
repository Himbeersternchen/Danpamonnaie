services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-danpamonnaie}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME:-danpamonnaie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/himbeersternchen/danpamonnaie-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_NAME: ${DATABASE_NAME:-danpamonnaie}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      TAILSCALE_HOST: ${TAILSCALE_HOST}
      DEBUG: "False"
      DJANGO_ENV: production

  frontend:
    image: ghcr.io/himbeersternchen/danpamonnaie-frontend:latest
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    ports:
      - "80:80"

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  static_files:
  media_files:
  pgadmin_data:
